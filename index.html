<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Par Calculator</title>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #202020;
  --border: #2e2e2e;
  --gold: #c9a84c;
  --gold-dim: #8a6e2e;
  --text: #e6e6e6;
  --muted: #777;
  --green: #52b37a;
  --red: #e05c5c;
  --blue: #5a9ee0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

/* ── Header ── */
header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; flex-direction: column; gap: 2px; }
.brand h1 { font-size: 16px; font-weight: 700; color: var(--gold); letter-spacing: 0.3px; }
.brand span { font-size: 11px; color: var(--muted); }
.header-controls { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-wrap: wrap; }
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.12s; white-space: nowrap; }
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
.btn-primary:hover { background: #dbb95a; color: #000; border-color: #dbb95a; }
.btn-ghost { background: none; border-color: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--red); border-color: var(--red); }

/* ── Location Switcher ── */
.loc-switcher {
  display: flex; align-items: center; gap: 2px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 3px;
}
.loc-btn {
  padding: 5px 18px; border-radius: 5px; border: none;
  background: none; color: var(--muted);
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.6px; text-transform: uppercase;
}
.loc-btn.active { background: var(--gold); color: #000; }
/* CKG blue theme */
body.loc-ckg { --gold: #5a9ee0; --gold-dim: #3a7ec0; }
body.loc-ckg .loc-btn.active { color: #fff; }

/* ── Summary Bar ── */
.summary-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; gap: 28px; align-items: center; flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; gap: 1px; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
.stat-value { font-size: 18px; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-value.highlight { color: var(--green); }

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; background: var(--surface); gap: 0; }
.tab-btn {
  padding: 11px 18px; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 13px; font-weight: 500;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.12s; display: flex; align-items: center; gap: 6px;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-btn .badge { background: var(--gold); color: #000; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
.tab-btn:not(.active) .badge { background: var(--surface2); color: var(--muted); }

/* ── Content ── */
.tab-content { display: none; padding: 20px 24px 40px; max-width: 1100px; }
.tab-content.active { display: block; }

/* ── Section Labels ── */
.section-header {
  display: flex; align-items: center; gap: 10px;
  margin: 24px 0 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-header:first-child { margin-top: 0; }
.section-title { font-size: 11px; font-weight: 700; color: var(--gold-dim); text-transform: uppercase; letter-spacing: 1px; }
.section-count { font-size: 11px; color: var(--muted); }

/* ── Sales Table ── */
.sales-table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
.sales-table th {
  text-align: left; padding: 7px 10px; font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.sales-table td { padding: 6px 10px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
.sales-table tr:hover td { background: var(--surface2); }
.drink-name { font-weight: 500; font-size: 13px; }
.drink-ing { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.no-recipe-tag { display: inline-block; background: #3a1a1a; color: var(--red); border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 600; margin-top: 2px; }
.qty-input {
  width: 64px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 8px; border-radius: 5px; font-size: 13px;
  text-align: center; transition: border-color 0.12s;
}
.qty-input:focus { outline: none; border-color: var(--gold); background: #252525; }
.qty-input.has-value { border-color: var(--gold-dim); color: var(--gold); font-weight: 600; }

/* ── Par Table ── */
.par-category-header {
  font-size: 10px; font-weight: 700; color: var(--gold-dim);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 14px 0 6px; margin-top: 4px;
}
.par-category-header:first-child { padding-top: 0; }
.par-table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
.par-table th {
  text-align: left; padding: 7px 12px; font-size: 10px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.par-table th:not(:first-child) { text-align: center; }
.par-table td { padding: 7px 12px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
.par-table tr:hover td { background: var(--surface2); }
.par-table td:not(:first-child) { text-align: center; }
.prep-name { font-weight: 500; font-size: 13px; }
.oz-needed { font-size: 16px; font-weight: 700; color: var(--gold); }
.oz-unit { font-size: 11px; color: var(--muted); }
.onhand-input {
  width: 72px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 8px; border-radius: 5px; font-size: 13px;
  text-align: center; transition: border-color 0.12s;
}
.onhand-input:focus { outline: none; border-color: var(--blue); }
.net-value { font-size: 15px; font-weight: 700; }
.net-positive { color: var(--green); }
.net-zero { color: var(--muted); font-weight: 400; }
.net-covered { color: var(--muted); font-size: 11px; }

.empty-state { padding: 48px 24px; text-align: center; color: var(--muted); }
.empty-state p { margin-bottom: 14px; font-size: 15px; }

/* ── Upload Panel ── */
.upload-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 20px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.upload-panel-label { font-size: 12px; font-weight: 600; color: var(--gold); white-space: nowrap; }
.upload-panel-sub { font-size: 11px; color: var(--muted); }
.upload-drop {
  flex: 1; min-width: 200px;
  border: 1.5px dashed var(--border); border-radius: 8px;
  padding: 12px 16px; text-align: center; cursor: pointer;
  transition: all 0.15s; color: var(--muted); font-size: 12px;
  background: var(--surface2);
}
.upload-drop:hover, .upload-drop.drag-over { border-color: var(--gold); color: var(--gold); background: #1f1a0d; }
.upload-drop input[type=file] { display: none; }
.import-results {
  margin-top: 10px; padding: 10px 14px;
  background: var(--surface2); border-radius: 7px;
  font-size: 12px; display: none;
}
.import-results.show { display: block; }
.import-match { color: var(--green); }
.import-skip { color: var(--muted); }
.import-warn { color: #e09a3a; }

/* ── Par Cards ── */
.par-card {
  display: grid;
  grid-template-columns: 1fr 130px 150px 150px;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.par-card-left {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
}
.par-card-name {
  font-weight: 600; font-size: 14px; margin-bottom: 8px;
}
.par-card-breakdown {
  font-size: 12px; line-height: 2;
}
.breakdown-drink {
  color: var(--text); font-weight: 500;
}
.breakdown-math {
  color: var(--muted);
}
.breakdown-math strong {
  color: var(--text);
}
.par-card-total, .par-card-onhand, .par-card-net {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px; justify-content: center;
}
.par-card-net { border-right: none; }
.par-card-total-label {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}

/* ── Buffer Control ── */
.buffer-control {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
}
.buffer-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
.buffer-presets { display: flex; gap: 4px; align-items: center; }
.buffer-preset {
  padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border);
  background: none; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 700;
  transition: all 0.12s; line-height: 1;
}
.buffer-preset:hover { border-color: var(--gold); color: var(--gold); }
.buffer-preset.active { background: var(--gold); color: #000; border-color: var(--gold); }
.buffer-step {
  padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border);
  background: none; color: var(--text); cursor: pointer; font-size: 14px; font-weight: 700;
  transition: all 0.12s; line-height: 1;
}
.buffer-step:hover { border-color: var(--gold); color: var(--gold); }
.buffer-display {
  min-width: 44px; text-align: center; font-size: 13px; font-weight: 700; color: var(--gold);
}
.buffer-custom { display: flex; align-items: center; gap: 4px; }
.buffer-input {
  width: 52px; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 3px 6px; border-radius: 5px;
  font-size: 12px; font-weight: 700; text-align: center;
}
.buffer-input:focus { outline: none; border-color: var(--gold); }

/* ── Historical avg hint ── */
.hist-avg { font-size: 10px; color: var(--muted); margin-top: 2px; }
/* ── Toggle unused ── */
.toggle-unused { margin-top: 16px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════ HEADER ═══════════════════════════════ -->
<header>
  <div class="brand">
    <h1>Bar Par Calculator</h1>
    <span id="locSubtitle">CKC Manga / ATP · Sales → Prep Needs</span>
  </div>
  <div class="loc-switcher">
    <button class="loc-btn active" id="locBtnCKC" onclick="switchLocation('CKC')">CKC</button>
    <button class="loc-btn" id="locBtnCKG" onclick="switchLocation('CKG')">CKG</button>
  </div>
  <div class="header-controls">
<button class="btn btn-ghost" onclick="clearSales()">Clear Sales</button>
    <button class="btn btn-ghost" onclick="clearOnHand()">Clear On Hand</button>
    <button class="btn" onclick="printPrepSheet()">🖨 Print Prep Sheet</button>
    <button class="btn btn-primary" onclick="showTab('pars')">View Pars →</button>
  </div>
</header>

<!-- ═══════════════════════════════ SUMMARY BAR ══════════════════════════════ -->
<div class="summary-bar">
  <div class="stat">
    <span class="stat-label">Drinks Sold</span>
    <span class="stat-value" id="statSold">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Prep Items Triggered</span>
    <span class="stat-value highlight" id="statItems">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Total Oz to Prep</span>
    <span class="stat-value" id="statOz">0</span>
  </div>
  <div style="margin-left:auto">
    <div class="buffer-control">
      <span class="buffer-label">Par Buffer</span>
      <div class="buffer-presets">
        <button class="buffer-step" onclick="stepBuffer(-5)">−</button>
        <span class="buffer-display" id="bufferDisplay">100%</span>
        <button class="buffer-step" onclick="stepBuffer(5)">+</button>
        <button class="buffer-preset" id="bufReset" onclick="setBuffer(100)">Reset</button>
      </div>
      <div class="buffer-custom">
        <input class="buffer-input" type="number" id="bufferInput" value="100" min="50" max="200"
          oninput="setBuffer(this.value, true)">
        <span style="font-size:11px;color:var(--muted)">%</span>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════ TABS ════════════════════════════════ -->
<div class="tabs">
  <button class="tab-btn active" id="tabBtnSales" onclick="showTab('sales')">
    1 · Sales Input
  </button>
  <button class="tab-btn" id="tabBtnPars" onclick="showTab('pars')">
    2 · Prep Pars
    <span class="badge" id="parsBadge">0</span>
  </button>
  <button class="tab-btn" id="tabBtnSpirits" onclick="showTab('spirits')">
    3 · Spirits &amp; Ordering
  </button>
  <button class="tab-btn" id="tabBtnMovement" onclick="showTab('movement')">
    4 · Cocktail Movement
  </button>
  <button class="tab-btn" id="tabBtnWaste" onclick="showTab('waste')">
    5 · Waste Log
    <span class="badge" id="wasteBadge" style="display:none"></span>
  </button>
  <button class="tab-btn" id="tabBtnYields" onclick="showTab('yields')">
    6 · Yields Guide
  </button>
</div>

<!-- ════════════════════════════════ SALES TAB ═══════════════════════════════ -->
<div class="tab-content active" id="tab-sales">

  <!-- Upload Panel -->
  <div class="upload-panel">
    <div>
      <div class="upload-panel-label">📋 Import Toast Product Mix</div>
      <div class="upload-panel-sub">Upload a CSV export from Toast to auto-fill quantities</div>
    </div>
    <div class="upload-drop" id="uploadDrop"
      onclick="document.getElementById('csvFile').click()"
      ondragover="event.preventDefault(); this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="handleDrop(event)">
      <input type="file" id="csvFile" accept=".csv,.txt" onchange="handleFileInput(event)">
      Drop CSV here or click to browse
    </div>
    <button class="btn btn-ghost" onclick="clearSales()" style="white-space:nowrap">Clear All</button>
  </div>
  <div class="import-results" id="importResults"></div>

  <div id="salesContent"></div>
</div>

<!-- ════════════════════════════════= PARS TAB ═══════════════════════════════ -->
<div class="tab-content" id="tab-pars">
  <div id="parsContent"></div>
</div>

<!-- ══════════════════════════════ YIELDS TAB ════════════════════════════════ -->
<div class="tab-content" id="tab-yields">
  <div id="yieldsContent"></div>
</div>

<!-- ═══════════════════════════════ WASTE TAB ════════════════════════════════ -->
<div class="tab-content" id="tab-waste">
  <div id="wasteContent"></div>
</div>

<!-- ══════════════════════════════ SPIRITS TAB ═══════════════════════════════ -->
<div class="tab-content" id="tab-spirits">
  <div id="spiritsContent"></div>
</div>

<!-- ════════════════════════════ MOVEMENT TAB ════════════════════════════════ -->
<div class="tab-content" id="tab-movement">
  <div id="movementContent"></div>
</div>

// ── Unit conversion ──────────────────────────────────────────────────────────
const OZ_TO_ML = 29.574;
function mlVal(oz)       { return Math.round(oz * OZ_TO_ML); }
function mlDisp(oz)      { return mlVal(oz) + ' ml'; }
function mlToOz(ml)      { return (ml / OZ_TO_ML).toFixed(1); }
function mlOzDisp(ml)    { return `${ml} ml (${mlToOz(ml)} oz)`; }
function btlOzLabel(bMl) { return `${bMl}ml / ${(bMl / OZ_TO_ML).toFixed(2)}oz`; }

// ══════════════════════════════════════════════════════════════════════════════
//  STATE  (in-memory; localStorage for persistence across reloads)
// ══════════════════════════════════════════════════════════════════════════════

let sales         = {};    // drinkName  → qty sold
let onHand        = {};    // prepItemId → oz on hand
let buffer        = 100;   // par buffer %
let wasteLog      = [];    // [ { id, date, qty, reason, notes } ]
let activeLocation = 'CKC'; // 'CKC' or 'CKG'

function locPrefix() { return activeLocation === 'CKG' ? 'ckg_pars_' : 'ck_pars_'; }

function saveState() {
  try {
    const pfx = locPrefix();
    localStorage.setItem(pfx + 'sales',     JSON.stringify(sales));
    localStorage.setItem(pfx + 'onhand',    JSON.stringify(onHand));
    localStorage.setItem(pfx + 'buffer',    buffer);
    localStorage.setItem(pfx + 'wastelog',  JSON.stringify(wasteLog));
  } catch(e) {}
}
function loadState() {
  try {
    const pfx = locPrefix();
    sales    = JSON.parse(localStorage.getItem(pfx + 'sales'))    || {};
    onHand   = JSON.parse(localStorage.getItem(pfx + 'onhand'))   || {};
    buffer   = parseFloat(localStorage.getItem(pfx + 'buffer'))   || 100;
    wasteLog = JSON.parse(localStorage.getItem(pfx + 'wastelog')) || [];
  } catch(e) {}
}

function switchLocation(loc) {
  if (activeLocation === loc) return;
  saveState(); // persist current location's data before switching
  activeLocation = loc;
  localStorage.setItem('ck_active_location', loc);
  // Color theme
  document.body.classList.toggle('loc-ckg', loc === 'CKG');
  // Switcher buttons
  document.getElementById('locBtnCKC').classList.toggle('active', loc === 'CKC');
  document.getElementById('locBtnCKG').classList.toggle('active', loc === 'CKG');
  // Subtitle
  document.getElementById('locSubtitle').textContent = loc === 'CKG'
    ? 'CKG Gilbert · Sales → Prep Needs'
    : 'CKC Manga / ATP · Sales → Prep Needs';
  // Load saved state for this location
  loadState();
  // Sync buffer UI to restored value (without triggering a saveState)
  document.getElementById('bufferInput').value = buffer;
  document.getElementById('bufferDisplay').textContent = buffer === 100 ? '100%' : `${buffer > 100 ? '+' : ''}${buffer - 100}%`;
  document.getElementById('bufReset').classList.toggle('active', buffer === 100);
  // Re-render everything currently visible
  renderSales();
  updateSummary();
  updateWasteBadge();
  if (document.getElementById('tab-pars').classList.contains('active'))     renderPars();
  if (document.getElementById('tab-spirits').classList.contains('active'))  renderSpirits();
  if (document.getElementById('tab-movement').classList.contains('active')) renderMovement();
  if (document.getElementById('tab-waste').classList.contains('active'))    renderWasteLog();
}

// ══════════════════════════════════════════════════════════════════════════════
//  CALCULATIONS
// ══════════════════════════════════════════════════════════════════════════════

function locDrinks() { return DRINKS.filter(d => (d.loc || 'CKC') === activeLocation); }

function calcNeeded(applyBuffer = false) {
  const totals = {};
  const mult = applyBuffer ? (buffer / 100) : 1;
  locDrinks().forEach(d => {
    const qty = parseFloat(sales[d.name]) || 0;
    if (!qty) return;
    Object.entries(d.ing).forEach(([id, oz]) => {
      totals[id] = (totals[id] || 0) + oz * qty * mult;
    });
  });
  return totals;
}

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER — SALES
// ══════════════════════════════════════════════════════════════════════════════

function renderSales() {
  const scoped = locDrinks();
  if (!scoped.length) { renderCKGPlaceholder('salesContent'); return; }
  const menus = [...new Set(scoped.map(d => d.menu))];
  let html = '';

  menus.forEach(menu => {
    const drinks = scoped.filter(d => d.menu === menu);
    const menuTotal = drinks.reduce((s, d) => s + (parseFloat(sales[d.name]) || 0), 0);
    html += `
      <div class="section-header">
        <span class="section-title">${menu}</span>
        <span class="section-count">${drinks.length} cocktails${menuTotal > 0 ? ' · ' + menuTotal + ' sold' : ''}</span>
      </div>
      <table class="sales-table">
        <thead><tr>
          <th style="width:220px">Cocktail</th>
          <th>Prep Items Used (per serving)</th>
          <th style="width:100px;text-align:center">Qty Sold</th>
        </tr></thead>
        <tbody>`;

    drinks.forEach(d => {
      const qty  = sales[d.name] || '';
      const ingParts = Object.entries(d.ing).map(([id, oz]) => {
        const item = PREP_MAP[id];
        return item ? `<span style="color:var(--text);opacity:.7">${oz}oz (${mlVal(oz)}ml)</span> ${item.name}` : '';
      }).filter(Boolean);
      const ingStr = ingParts.length ? ingParts.join('&ensp;·&ensp;') : '<em style="opacity:.4">no tracked prep</em>';
      const safe = d.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

      html += `
        <tr>
          <td>
            <div class="drink-name">${d.name}</div>
            ${d.note ? `<div class="no-recipe-tag">⚠ ${d.note}</div>` : ''}
          </td>
          <td><div class="drink-ing">${ingStr}</div></td>
          <td style="text-align:center">
            <input class="qty-input${qty ? ' has-value' : ''}" type="number" min="0" step="1"
              value="${qty}" placeholder="0"
              oninput="setSales('${safe}', this.value); this.classList.toggle('has-value', !!this.value)">
            ${HISTORICAL_AVG[d.name] ? `<div class="hist-avg">↳ sold ~${Math.round(HISTORICAL_AVG[d.name])}/wk on average in 2025</div>` : ''}
          </td>
        </tr>`;
    });

    html += `</tbody></table>`;
  });

  document.getElementById('salesContent').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER — PARS
// ══════════════════════════════════════════════════════════════════════════════


function renderPars() {
  if (!locDrinks().length) { renderCKGPlaceholder('parsContent'); return; }
  const needed = calcNeeded(true);
  const activeIds = new Set(Object.keys(needed).filter(id => needed[id] > 0));
  Object.keys(onHand).forEach(id => { if (onHand[id] > 0) activeIds.add(id); });

  if (activeIds.size === 0) {
    document.getElementById('parsContent').innerHTML = `
      <div class="empty-state">
        <p>No sales entered yet.</p>
        <button class="btn btn-primary" onclick="showTab('sales')">← Enter Sales</button>
      </div>`;
    return;
  }

  const SPIRIT_CATS = ['Spirit', 'Liqueur'];
  const categories = [...new Set(PREP_ITEMS.map(p => p.cat))];
  let html = '';

  categories.forEach(cat => {
    if (SPIRIT_CATS.includes(cat)) return;   // spirits live on the Spirits & Ordering tab
    const items = PREP_ITEMS.filter(p => activeIds.has(p.id) && p.cat === cat);
    if (!items.length) return;

    html += `<div class="par-category-header">${cat}</div>`;

    items.forEach(p => {
      const bMl     = p.btl || 750;                 // this item's bottle size in ml
      const need    = needed[p.id] || 0;            // oz (internal)
      const needMl  = mlVal(need);                  // ml
      const needBtl = Math.ceil(needMl / bMl);      // bottles needed
      const handMl  = onHand[p.id] || 0;            // ml on hand
      const handBtl = handMl / bMl;                 // bottles on hand (for input display)
      const netMl   = Math.max(0, needMl - handMl);
      const netBtl  = Math.ceil(netMl / bMl);
      const surplusMl  = Math.max(0, handMl - needMl);
      const surplusBtl = Math.floor(surplusMl / bMl * 2) / 2;

      // Status display
      let statusHtml;
      if (need === 0) {
        statusHtml = '<span style="color:var(--muted)">—</span>';
      } else if (netMl === 0) {
        statusHtml = `<span style="color:var(--green);font-weight:700;font-size:15px;">Covered ✓</span>`;
      } else {
        statusHtml = `${netBtl} btl <span style="font-size:11px;font-weight:400;opacity:.6">(${netMl} ml)</span>`;
      }

      // Build per-drink breakdown lines
      const drivers = locDrinks().filter(d => d.ing[p.id] && (parseFloat(sales[d.name]) || 0) > 0);
      const breakdownLines = drivers.map(d => {
        const qty    = parseInt(sales[d.name]);
        const oz     = d.ing[p.id];
        const subtot = mlVal(qty * oz);
        return `<span class="breakdown-drink">${d.name}</span> <span class="breakdown-math">×${qty} sold &nbsp;·&nbsp; ${oz} oz (${mlVal(oz)}ml) each &nbsp;=&nbsp; <strong>${mlOzDisp(subtot)}</strong></span>`;
      }).join('<br>');

      html += `
        <div class="par-card">
          <div class="par-card-left">
            <div class="par-card-name">${p.name}</div>
            <div class="par-card-breakdown">${breakdownLines || '<em style="opacity:.4">no sales</em>'}</div>
          </div>
          <div class="par-card-total">
            <div class="par-card-total-label">Used This Week</div>
            <div class="oz-needed">${needMl}<span class="oz-unit"> ml</span></div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;">${mlToOz(needMl)} oz</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;">${parseFloat((needMl/bMl).toFixed(2))} btl used</div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;border-top:1px solid var(--border);padding-top:4px;">${needBtl} btl to prep <span style="opacity:.5">(${bMl}ml)</span></div>
          </div>
          <div class="par-card-onhand">
            <div class="par-card-total-label">On Hand (btl)</div>
            <div style="display:flex;align-items:center;gap:5px">
              <input class="onhand-input" type="number" min="0" step="0.5"
                value="${handBtl || ''}" placeholder="0" data-id="${p.id}"
                oninput="setOnHand('${p.id}', this.value)">
              <span class="oz-unit">btl</span>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px;">${bMl}ml per btl</div>
          </div>
          <div class="par-card-net" style="min-width:200px;">
            <div class="par-card-total-label">Bottles to Prep</div>
            <div data-netid="${p.id}">${statusHtml}</div>
          </div>
        </div>`;
    });
  });

  document.getElementById('parsContent').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
//  SUMMARY BAR
// ══════════════════════════════════════════════════════════════════════════════

function updateSummary() {
  const needed = calcNeeded(true);
  const totalSold  = Object.values(sales).reduce((s, v) => s + (parseFloat(v)||0), 0);
  const itemCount  = Object.keys(needed).filter(id => needed[id] > 0).length;
  const totalOz    = Object.values(needed).reduce((s, v) => s + v, 0);

  document.getElementById('statSold').textContent  = totalSold;
  document.getElementById('statItems').textContent = itemCount;
  document.getElementById('statOz').textContent    = totalOz.toFixed(1);
  document.getElementById('parsBadge').textContent = itemCount;
}

function stepBuffer(delta) {
  setBuffer(buffer + delta);
}

function setBuffer(val, fromInput = false) {
  buffer = Math.min(200, Math.max(50, parseFloat(val) || 100));
  if (!fromInput) document.getElementById('bufferInput').value = buffer;
  const sign = buffer > 100 ? '+' : '';
  const diff = buffer - 100;
  document.getElementById('bufferDisplay').textContent = buffer === 100 ? '100%' : `${sign}${diff}%`;
  document.getElementById('bufReset').classList.toggle('active', buffer === 100);
  saveState();
  updateSummary();
  if (document.getElementById('tab-pars').classList.contains('active')) renderPars();
}

function setSales(name, val) {
  const n = parseFloat(val);
  if (!n || n <= 0) delete sales[name]; else sales[name] = n;
  saveState();
  updateSummary();
  // Re-render pars if that tab is active
  if (document.getElementById('tab-pars').classList.contains('active')) renderPars();
}

function setOnHand(id, val) {
  const bMl = btlMl(id);
  const btl = parseFloat(val);
  const ml  = btl > 0 ? Math.round(btl * bMl) : 0;
  if (!ml) delete onHand[id]; else onHand[id] = ml; // stored as ml
  saveState();
  // Update just the status cell in-place — avoids re-render which kills focus
  const netEl = document.querySelector(`[data-netid="${id}"]`);
  if (netEl) {
    const needed  = calcNeeded(true);
    const need    = needed[id] || 0;
    const needMl  = mlVal(need);
    const needBtl = Math.ceil(needMl / bMl);
    const handMl  = onHand[id] || 0;
    const handBtl = handMl / bMl;
    const netMl   = Math.max(0, needMl - handMl);
    const netBtl  = Math.ceil(netMl / bMl);
    const surplusMl  = Math.max(0, handMl - needMl);
    const surplusBtl = Math.floor(surplusMl / bMl * 2) / 2;

    let statusHtml;
    if (need === 0) {
      statusHtml = '<span style="color:var(--muted)">—</span>';
    } else if (netMl === 0) {
      statusHtml = `<span style="color:var(--green);font-weight:700;font-size:15px;">Covered ✓</span>`;
    } else {
      statusHtml = `${netBtl} btl <span style="font-size:11px;font-weight:400;opacity:.6">(${netMl} ml)</span>`;
    }
    netEl.innerHTML = statusHtml;
  }
  // Also update Spirits & Ordering "To Order" cell in-place if visible
  const spiritOrderEl = document.querySelector(`[data-spirit-orderid="${id}"]`);
  if (spiritOrderEl) {
    const needed2 = calcNeeded(true);
    const need2   = needed2[id] || 0;
    const needMl2 = Math.round(need2 * OZ_TO_ML);
    const netMl2  = Math.max(0, needMl2 - (onHand[id] || 0));
    const netBtl2 = Math.ceil(netMl2 / bMl);
    spiritOrderEl.style.color    = netBtl2 > 0 ? 'var(--gold)' : 'var(--green)';
    spiritOrderEl.style.fontWeight = netBtl2 > 0 ? '700' : '';
    spiritOrderEl.textContent    = netBtl2 > 0 ? netBtl2 + ' btl' : need2 > 0 ? 'Covered ✓' : '—';
  }
}

function showTab(tab) {
  ['sales','pars','yields','waste','spirits','movement'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
  });
  if (tab === 'pars')     renderPars();
  if (tab === 'yields')   renderYields();
  if (tab === 'waste')    renderWasteLog();
  if (tab === 'spirits')  renderSpirits();
  if (tab === 'movement') renderMovement();
}

function updateWasteBtlLabel() {
  const itemId = document.getElementById('wasteItem').value;
  const size   = itemId ? btlMl(itemId) : null;
  const el     = document.getElementById('wasteBtlSize');
  if (el) el.textContent = size ? `(${size}ml)` : '';
}

function addWasteEntry() {
  const itemId  = document.getElementById('wasteItem').value;
  const bMl     = itemId ? btlMl(itemId) : 750;
  const btl     = parseFloat(document.getElementById('wasteQtyBtl').value)  || 0;
  const oz      = parseFloat(document.getElementById('wasteQtyOz').value)   || 0;
  const manualMl= parseFloat(document.getElementById('wasteQtyMl').value)   || 0;
  const qty     = Math.round(btl * bMl) + Math.round(oz * OZ_TO_ML) + manualMl;
  const reason  = document.getElementById('wasteReason').value;
  const notes   = document.getElementById('wasteNotes').value.trim();
  const date    = document.getElementById('wasteDate').value;
  const errEl   = document.getElementById('wasteFormError');

  if (!itemId) { errEl.textContent = 'Please select an item.'; errEl.style.display = ''; return; }
  if (qty <= 0) { errEl.textContent = 'Please enter a quantity (bottles, oz, or ml).'; errEl.style.display = ''; return; }
  errEl.style.display = 'none';

  wasteLog.push({
    logId: Date.now() + Math.random().toString(36).slice(2),
    id: itemId, qty, reason, notes, date
  });
  saveState();
  renderWasteLog();
}

function deleteWaste(logId) {
  wasteLog = wasteLog.filter(e => e.logId !== logId);
  saveState();
  renderWasteLog();
}

function clearWasteLog() {
  if (!confirm('Clear all waste log entries?')) return;
  wasteLog = [];
  saveState();
  renderWasteLog();
}

function exportWasteCSV() {
  const header = 'Date,Item,Qty (ml),Reason,Notes';
  const rows = wasteLog.map(e => {
    const item = PREP_ITEMS.find(p => p.id === e.id);
    const name = item ? item.name : e.id;
    return [e.date, `"${name}"`, e.qty, `"${e.reason}"`, `"${(e.notes||'').replace(/"/g,'""')}"`].join(',');
  });
  const csv = [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `waste-log-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function clearSales() {
  if (!confirm('Clear all entered sales quantities?')) return;
  sales = {};
  saveState();
  renderSales();
  updateSummary();
  if (document.getElementById('tab-pars').classList.contains('active')) renderPars();
}

function clearOnHand() {
  if (!confirm('Clear all on hand bottle quantities?')) return;
  onHand = {};
  saveState();
  if (document.getElementById('tab-pars').classList.contains('active')) renderPars();
}

function normalizeName(str) {
  return str.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
}

// Strip Toast location/modifier prefixes and suffixes before lookup
function cleanToastName(raw) {
  return raw
    .replace(/^ITT\s+/i, '')         // "ITT Negroni" → "Negroni"
    .replace(/\s+(ATP|RC)$/i, '')     // "Hanami ATP" → "Hanami"
    .replace(/^FEATURE[:\s]+/i, '')   // "FEATURE: Pretty In Pink" → "Pretty In Pink"
    .trim();
}

// Items that are not cocktails — skip silently
const IGNORE_ITEMS = new Set([
  'club soda', 'soda water', 'mocktail', 'water', 'juice',
  'classic cocktail', 'classic cocktail atp', 'house cocktail rc',
  'honest liar atp', 'rummin wild atp', 'calpico milk punch atp',
  'banana stand rc', 'endless summer rc',
  'house aperitivo', 'house aperitivo atp',
]);


// Build lookup: normalized drink name → canonical name
const DRINK_LOOKUP = {};
DRINKS.forEach(d => {
  DRINK_LOOKUP[normalizeName(d.name)] = d.name;
});
Object.entries(NAME_ALIASES).forEach(([alias, canonical]) => {
  DRINK_LOOKUP[normalizeName(alias)] = canonical;
});

function matchDrinkName(raw) {
  // Check ignore list first
  if (IGNORE_ITEMS.has(raw.toLowerCase().trim())) return '__ignore__';
  // Try cleaned name (strips ITT, FEATURE, ATP, RC)
  const cleaned = cleanToastName(raw);
  const norm = normalizeName(cleaned);
  if (DRINK_LOOKUP[norm]) return DRINK_LOOKUP[norm];
  // Also try original raw in case cleaning went wrong
  const normRaw = normalizeName(raw);
  if (DRINK_LOOKUP[normRaw]) return DRINK_LOOKUP[normRaw];
  // Partial match
  for (const [key, canonical] of Object.entries(DRINK_LOOKUP)) {
    if (norm.includes(key) || key.includes(norm)) return canonical;
  }
  return null;
}

function parseCSV(text) {
  // Split into lines, handle \r\n and \n
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim());

  // Find header row — look for a row containing "qty" somewhere
  let headerIdx = -1;
  let headers = [];
  for (let i = 0; i < Math.min(lines.length, 10); i++) {
    const cols = splitCSVLine(lines[i]);
    const lower = cols.map(c => c.toLowerCase());
    if (lower.some(c => c.includes('qty') || c.includes('quantity'))) {
      headerIdx = i;
      headers = lower;
      break;
    }
  }

  // Find item name and qty sold column indices
  let nameCol = -1, qtyCol = -1;
  if (headerIdx >= 0) {
    headers.forEach((h, i) => {
      if (qtyCol === -1 && (h.includes('qty') || h.includes('quantity'))) qtyCol = i;
      if (nameCol === -1 && (h.includes('item') || h.includes('menu') || h === '' || i === 0)) nameCol = i;
    });
    if (nameCol === -1) nameCol = 0;
  } else {
    // No header found — assume first col = name, third col = qty (Toast default layout)
    nameCol = 0; qtyCol = 2; headerIdx = -1;
  }

  const results = { matched: [], skipped: [], unmatched: [] };
  const startRow = headerIdx + 1;

  for (let i = startRow; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.length <= Math.max(nameCol, qtyCol)) continue;

    const rawName = cols[nameCol].replace(/^["']|["']$/g, '').trim();
    const rawQty  = cols[qtyCol].replace(/^["']|["']$/g, '').trim();
    const qty = parseInt(rawQty);

    if (!rawName || isNaN(qty)) continue;
    if (qty <= 0) { results.skipped.push(rawName); continue; }

    const canonical = matchDrinkName(rawName);
    if (canonical === '__ignore__') { results.skipped.push(rawName); continue; }
    if (canonical) {
      results.matched.push({ name: canonical, qty, raw: rawName });
    } else {
      // Skip obvious category headers / totals
      if (rawName.toLowerCase().includes('total') || rawName.toLowerCase().includes('subtotal')) continue;
      results.unmatched.push({ raw: rawName, qty });
    }
  }

  return results;
}

function splitCSVLine(line) {
  // Handle quoted fields with commas
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

function applyImport(results) {
  // Apply matched items — accumulate so ITT/ATP/RC variants sum with the base entry
  results.matched.forEach(({ name, qty }) => {
    sales[name] = (sales[name] || 0) + qty;
  });
  saveState();
  renderSales();
  updateSummary();
  if (document.getElementById('tab-pars').classList.contains('active')) renderPars();

  // Show results
  const el = document.getElementById('importResults');
  let html = `<span class="import-match">✓ ${results.matched.length} drinks matched and filled</span>`;
  if (results.unmatched.length) {
    html += `&ensp;·&ensp;<span class="import-warn">⚠ ${results.unmatched.length} not recognized: ${results.unmatched.map(u => u.raw).join(', ')}</span>`;
  }
  if (results.skipped.length) {
    html += `&ensp;·&ensp;<span class="import-skip">${results.skipped.length} skipped (0 qty)</span>`;
  }
  el.innerHTML = html;
  el.classList.add('show');
}

function handleFileInput(event) {
  const file = event.target.files[0];
  if (!file) return;
  readAndParse(file);
}

function handleDrop(event) {
  event.preventDefault();
  document.getElementById('uploadDrop').classList.remove('drag-over');
  const file = event.dataTransfer.files[0];
  if (file) readAndParse(file);
}

function readAndParse(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const results = parseCSV(e.target.result);
    applyImport(results);
  };
  reader.readAsText(file);
}

function renderMovement() {
  const scopedDrinks = locDrinks();
  if (!scopedDrinks.length) { renderCKGPlaceholder('movementContent'); return; }
  const soldDrinks = scopedDrinks.filter(d => (parseFloat(sales[d.name]) || 0) > 0);

  if (!soldDrinks.length) {
    document.getElementById('movementContent').innerHTML = `
      <div class="empty-state">
        <p>No sales entered yet.</p>
        <button class="btn btn-primary" onclick="showTab('sales')">← Enter Sales</button>
      </div>`;
    return;
  }

  const totalSold = soldDrinks.reduce((s, d) => s + (parseFloat(sales[d.name]) || 0), 0);

  // Slow mover threshold: below the weekly average per cocktail (more meaningful than a fixed %)
  const avgSold = totalSold / soldDrinks.length;
  const SLOW_THRESHOLD = avgSold * 0.6; // below 60% of average = slow mover

  // Build prep item → cocktail usage map (for single-cocktail insight)
  const prepUsage = {};
  scopedDrinks.forEach(d => {
    const qty = parseFloat(sales[d.name]) || 0;
    if (!qty) return;
    Object.entries(d.ing).forEach(([id, oz]) => {
      if (!prepUsage[id]) prepUsage[id] = [];
      prepUsage[id].push({ name: d.name, qty, oz, totalOz: oz * qty });
    });
  });

  // Low-use: only in 1 cocktail AND < 8 oz total — retirement candidates
  const lowUseItems = Object.entries(prepUsage)
    .filter(([id, uses]) => uses.length === 1 && uses[0].totalOz < 8)
    .map(([id, uses]) => ({ item: PREP_MAP[id], use: uses[0], drink: scopedDrinks.find(d => d.name === uses[0].name) }))
    .filter(x => x.item && !['Spirit','Liqueur'].includes(x.item.cat))
    .sort((a, b) => b.use.qty - a.use.qty);

  // Single-dependency: only in 1 cocktail, >= 8 oz, BUT only flag if that cocktail is also a slow mover
  // High-selling cocktails with exclusive prep items aren't a real risk — no need to surface them
  const singleDepItems = Object.entries(prepUsage)
    .filter(([id, uses]) => uses.length === 1 && uses[0].totalOz >= 8 && uses[0].qty <= SLOW_THRESHOLD)
    .map(([id, uses]) => ({ item: PREP_MAP[id], use: uses[0], drink: scopedDrinks.find(d => d.name === uses[0].name) }))
    .filter(x => x.item && !['Spirit','Liqueur'].includes(x.item.cat))
    .sort((a, b) => a.use.qty - b.use.qty);

  // ── Header ──────────────────────────────────────────────────────────────────
  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <div style="flex:1;min-width:200px;">
        <div style="font-size:18px;font-weight:700;color:var(--gold)">Cocktail Movement</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${soldDrinks.length} cocktails sold · ${totalSold} total drinks this period</div>
      </div>
    </div>`;

  // ── Per-menu velocity tables ─────────────────────────────────────────────────
  const MENU_LABELS = {
    'Classics':     'Classic Cocktails',
    'CKC Manga':    'CKC Manga Cocktails',
    'ATP':          'ATP Cocktails',
    'CKG Classics': 'CKG Classic Cocktails',
    'CKG Manga':    'CKG Manga Cocktails',
  };
  const menus = [...new Set(scopedDrinks.map(d => d.menu))];

  menus.forEach(menu => {
    const menuDrinks = soldDrinks.filter(d => d.menu === menu)
      .sort((a, b) => (parseFloat(sales[b.name]) || 0) - (parseFloat(sales[a.name]) || 0));
    if (!menuDrinks.length) return;

    const menuTotal    = menuDrinks.reduce((s, d) => s + (parseFloat(sales[d.name]) || 0), 0);
    const slowCount    = menuDrinks.filter(d => (parseFloat(sales[d.name]) || 0) <= SLOW_THRESHOLD).length;
    const label        = MENU_LABELS[menu] || menu;

    html += `
      <div class="section-header" style="margin-bottom:8px;">
        <span class="section-title">${label}</span>
        <span class="section-count">${menuDrinks.length} cocktails · ${menuTotal} sold${slowCount ? ' · ' + slowCount + ' slow mover' + (slowCount > 1 ? 's' : '') : ''}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:24px;">
        <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);">
          <th style="text-align:left;padding:6px 8px;font-weight:600;">#</th>
          <th style="text-align:left;padding:6px 8px;font-weight:600;">Cocktail</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">Sold</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">% of Menu</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">% of All Sales</th>
        </tr></thead><tbody>`;

    menuDrinks.forEach((d, i) => {
      const qty      = parseFloat(sales[d.name]) || 0;
      const pctMenu  = ((qty / menuTotal) * 100).toFixed(1);
      const pctAll   = ((qty / totalSold) * 100).toFixed(1);
      const slow     = qty <= SLOW_THRESHOLD;
      const rank     = i + 1;
      const rankColor = rank === 1 ? 'color:var(--gold);font-weight:700' : '';
      const rowStyle = slow ? 'color:var(--muted);' : '';
      html += `
        <tr style="border-bottom:1px solid var(--border);${rowStyle}">
          <td style="padding:8px 8px;${rankColor}">${rank}</td>
          <td style="padding:8px 8px;font-weight:600;">${d.name}</td>
          <td style="text-align:right;padding:8px 8px;">${qty}</td>
          <td style="text-align:right;padding:8px 8px;">${pctMenu}%</td>
          <td style="text-align:right;padding:8px 8px;">${pctAll}%</td>
        </tr>`;
    });
    html += `</tbody></table>`;
  });

  // ── Low-use prep items (retirement candidates) ───────────────────────────────
  const LOW_USE_PROGRAMS = [
    { key:'CKC Manga',    label:'CKC Manga' },
    { key:'ATP',          label:'ATP' },
    { key:'Classics',     label:'Classics' },
    { key:'CKG Manga',    label:'CKG Manga' },
    { key:'CKG Classics', label:'CKG Classics' },
  ];
  const anyLowUse = LOW_USE_PROGRAMS.some(({ key }) => lowUseItems.some(x => x.drink && x.drink.menu === key));
  if (anyLowUse) {
    html += `
      <div class="section-header" style="margin-bottom:12px;">
        <span class="section-title">Low-Use Prep Items</span>
        <span class="section-count">1 cocktail only · under 8 oz used · retirement candidates</span>
      </div>`;
    LOW_USE_PROGRAMS.forEach(({ key, label }) => {
      const items = lowUseItems.filter(x => x.drink && x.drink.menu === key);
      if (!items.length) return;
      html += `<div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;padding:0 4px;">${label}</div>`;
      html += `<table style="width:100%;border-collapse:collapse;margin-bottom:16px;">
        <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);">
          <th style="text-align:left;padding:6px 8px;font-weight:600;">Prep Item</th>
          <th style="text-align:left;padding:6px 8px;font-weight:600;">Only Used In</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">Cocktails Sold</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">Total oz Used</th>
        </tr></thead><tbody>`;
      items.forEach(({ item, use }) => {
        html += `<tr style="border-bottom:1px solid var(--border);">
          <td style="padding:8px 8px;font-weight:600;">${item.name}</td>
          <td style="padding:8px 8px;">${use.name} <span style="font-size:11px;color:var(--muted);">(${use.oz} oz/serve)</span></td>
          <td style="text-align:right;padding:8px 8px;">${use.qty}</td>
          <td style="text-align:right;padding:8px 8px;">${use.totalOz.toFixed(1)} oz</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    });
  }

  // ── Single-dependency prep items (menu risk) ─────────────────────────────────
  const anySingleDep = LOW_USE_PROGRAMS.some(({ key }) => singleDepItems.some(x => x.drink && x.drink.menu === key));
  if (anySingleDep) {
    html += `
      <div class="section-header" style="margin-bottom:12px;">
        <span class="section-title">Single-Use Prep Items</span>
        <span class="section-count">1 cocktail only · slow-moving cocktail · at risk if cut</span>
      </div>`;
    LOW_USE_PROGRAMS.forEach(({ key, label }) => {
      const items = singleDepItems.filter(x => x.drink && x.drink.menu === key);
      if (!items.length) return;
      html += `<div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;padding:0 4px;">${label}</div>`;
      html += `<table style="width:100%;border-collapse:collapse;margin-bottom:16px;">
        <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);">
          <th style="text-align:left;padding:6px 8px;font-weight:600;">Prep Item</th>
          <th style="text-align:left;padding:6px 8px;font-weight:600;">Only Used In</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">Cocktails Sold</th>
          <th style="text-align:right;padding:6px 8px;font-weight:600;">Total oz Used</th>
        </tr></thead><tbody>`;
      items.forEach(({ item, use }) => {
        html += `<tr style="border-bottom:1px solid var(--border);">
          <td style="padding:8px 8px;font-weight:600;">${item.name}</td>
          <td style="padding:8px 8px;">${use.name} <span style="font-size:11px;color:var(--muted);">(${use.oz} oz/serve)</span></td>
          <td style="text-align:right;padding:8px 8px;">${use.qty}</td>
          <td style="text-align:right;padding:8px 8px;">${use.totalOz.toFixed(1)} oz</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    });
  }

  document.getElementById('movementContent').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER — SPIRITS & ORDERING
// ══════════════════════════════════════════════════════════════════════════════
function renderSpirits() {
  const spiritCats = ['Spirit', 'Liqueur'];
  const spiritItems = PREP_ITEMS.filter(p => spiritCats.includes(p.cat));
  const needed = calcNeeded(true);

  // Group by sub-category
  const groups = {};
  const subOrder = [
    ['Vodka',       ['monopolowa_v','zubrowka_v','haku_v','pork_fat_vodka']],
    ['Gin / Shochu',['monopolowa_g','navy_gin','roku_gin','iichiko_s','kuro_kabuto','hayman_old_tom']],
    ['Rum',         ['denizen_r','goslings_r','worthy_park','rhum_jm','cachaca_r','probitas_r','kalani_r','hamilton_86','diplomatico_r','rhum_agri','rhum_jm_100','roncolon_banana_rum']],
    ['Whiskey',     ['dickel_rye','dickel_bourbon','bankNote_scotch','bardstown_bbn','akashi_whisky','bankNote_peated','suntory_toki']],
    ['Agave',       ['el_dist_tequila','arette_repo','arette_blanco','rayu_mezcal','campo_repo']],
    ['Other Spirits',['pisco_r','cognac_r','apple_jack','pear_brandy','couvignac']],
    ['Liqueurs & Fortified', ['genepy','lillet_rouge','lillet_blanc','banana_liq','velvet_fal','ancho_reyes',
      'maraschino_l','limoncello_l','dolin_blanc','cardamaro_l','montenegro_l','berry_amaro','averna_l',
      'choya_l','fig_liq','akashi_ume','nux_alpina','oloroso_s','amontillado_s','fino_sherry','pimms_spirit',
      'kiku_spirit','pine_amaro','chareau_l','dry_curacao','peach_liq','giffard_pass','cometico_l',
      'jelinek_fernet','tuve_fernet','chartreuse_g','absinthe','agricanto_cherry','amaretto','ancho_verde',
      'bandoeng_pandan','becherovka','benedictine','blue_curacao','cappelletti_aperitivo','cream_sherry',
      'creme_cassis','creme_violette','cynar_ricetta','drambuie','eldee_ts','galliano','giffard_lychee',
      'house_dry_verm','house_sweet_verm','negroni16','newdeal_coffee','nonino_amaro','quina_quina',
      'salers_aperitif','solera_sherry','supercassis','suze','swedish_punsch','tuve_bitter_liq',
      'yellow_chartreuse','zucca','zucca_porkbelly','midori_liq']],
  ];

  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
    <div style="flex:1;min-width:200px;">
      <div style="font-size:18px;font-weight:700;color:var(--gold)">Spirits & Ordering</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">Theoretical usage based on sales · Compare to physical count for variance</div>
    </div>
    <button class="btn btn-primary" onclick="printOrderSheet()">Print Order Sheet</button>
  </div>`;

  let anyUsage = false;
  for (const [groupName, ids] of subOrder) {
    const items = ids.map(id => PREP_MAP[id]).filter(Boolean).filter(p => (needed[p.id] || 0) > 0);
    if (!items.length) continue;
    anyUsage = true;

    html += `<div class="section-header"><span class="section-title">${groupName}</span></div>`;
    html += `<table style="width:100%;border-collapse:collapse;margin-bottom:8px;">
      <thead><tr style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);">
        <th style="text-align:left;padding:6px 8px;font-weight:600;">Item</th>
        <th style="text-align:right;padding:6px 8px;font-weight:600;">Used (oz)</th>
        <th style="text-align:right;padding:6px 8px;font-weight:600;">Used (ml)</th>
        <th style="text-align:right;padding:6px 8px;font-weight:600;">Btl Used</th>
        <th style="text-align:right;padding:6px 8px;font-weight:600;">On Hand</th>
        <th style="text-align:right;padding:6px 8px;font-weight:600;color:var(--gold);">To Order</th>
      </tr></thead><tbody>`;

    for (const p of items) {
      const need    = needed[p.id] || 0;
      const needMl  = Math.round(need * OZ_TO_ML);
      const needOz  = need.toFixed(2);
      const bMl     = p.btl || 750;
      const btlUsed = parseFloat((needMl / bMl).toFixed(2));
      const handMl  = onHand[p.id] || 0;
      const handBtl = parseFloat((handMl / bMl).toFixed(2));
      const netMl   = Math.max(0, needMl - handMl);
      const netBtl  = Math.ceil(netMl / bMl);
      const rowColor = need === 0 ? 'color:var(--muted)' : '';
      const orderColor = netBtl > 0 ? 'color:var(--gold);font-weight:700' : 'color:var(--green)';

      html += `<tr style="border-bottom:1px solid var(--border);${rowColor}">
        <td style="padding:8px 8px;">${p.name}</td>
        <td style="text-align:right;padding:8px 8px;">${need > 0 ? needOz : '—'}</td>
        <td style="text-align:right;padding:8px 8px;">${need > 0 ? needMl + ' ml' : '—'}</td>
        <td style="text-align:right;padding:8px 8px;">${need > 0 ? btlUsed + ' btl' : '—'}</td>
        <td style="text-align:right;padding:8px 8px;">
          <input type="number" min="0" step="0.5" value="${handBtl || ''}" placeholder="0"
            style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text);text-align:right;font-size:12px;"
            oninput="setOnHand('${p.id}',this.value)"
          >
          <span style="font-size:10px;color:var(--muted);margin-left:4px;">btl</span>
        </td>
        <td data-spirit-orderid="${p.id}" style="text-align:right;padding:8px 8px;${orderColor}">${netBtl > 0 ? netBtl + ' btl' : need > 0 ? 'Covered ✓' : '—'}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  if (!Object.keys(sales).length) {
    html = `<div style="text-align:center;padding:60px 20px;color:var(--muted);">
      <div style="font-size:32px;margin-bottom:12px;">📊</div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">No Sales Data</div>
      <div>Upload a CSV or enter sales on the Sales tab first.</div>
    </div>`;
  } else if (!anyUsage) {
    html += `<div style="text-align:center;padding:40px 20px;color:var(--muted);border:1px dashed var(--border);border-radius:8px;margin-top:12px;">
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;">Sales loaded but no spirit usage calculated</div>
      <div style="font-size:12px;line-height:1.6;">This can happen if your sales were saved before spirits were added to the recipes.<br>
      Try clearing sales on the Sales tab and re-uploading your CSV.</div>
    </div>`;
  }

  document.getElementById('spiritsContent').innerHTML = html;
}

</script>
</body>
</html>
